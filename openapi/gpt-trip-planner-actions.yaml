openapi: 3.1.0
info:
  title: Trip Planner GPT Actions API
  version: 0.1.0
  description: |
    Private Trip Planner ops action for Jones. Enables read, search, and normal planner mutations. Root/admin arbitrary writes remain unavailable.
servers:
  - url: https://us-central1-trip-planner-ab5a9.cloudfunctions.net
    description: Firebase Functions base origin for Trip Planner GPT Actions.
paths:
  /gptTripPlannerAction:
    post:
      operationId: gptTripPlannerAction
      summary: Operate Jones private Tokyo May 2026 trip planner.
      description: |
        Private planner ops gateway. Enables reads/search plus card update, add, comment, move/remove slot, label rename, and backup. Root writes disabled.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GptTripPlannerActionRequest'
            examples:
              inspectTrip:
                value:
                  action: inspectTrip
              inspectDay:
                value:
                  action: inspectDay
                  date: '5/2'
                  zone: afternoon
              inspectCard:
                value:
                  action: inspectCard
                  titleKeyword: 秋葉原
              searchCards:
                value:
                  action: searchCards
                  query: 秋葉原
                  missingLocation: false
                  limit: 10
              addCandidateCard:
                value:
                  action: addCandidateCard
                  date: '5/3'
                  zone: afternoon
                  card:
                    title: 中野百老匯
                    subtitle: Nakano Broadway
                    area: Nakano
                    duration: 2-3 hr
                    note: 候選購物點
                    tags: [購物, 動漫, 模型]
              updateCandidateCard:
                value:
                  action: updateCandidateCard
                  titleKeyword: 中野百老匯
                  patch:
                    note: 補上營業時間與交通備註
                    tags: [購物, 動漫, 必去]
              appendCommentToCard:
                value:
                  action: appendCommentToCard
                  titleKeyword: 秋葉原
                  text: 旅途中備註
              moveCardToSlot:
                value:
                  action: moveCardToSlot
                  cardId: akihabara
                  date: '5/2'
                  zone: afternoon
              removeCardFromSlot:
                value:
                  action: removeCardFromSlot
                  cardId: akihabara
                  date: '5/2'
                  zone: afternoon
              renameDayLabel:
                value:
                  action: renameDayLabel
                  date: '5/2'
                  label: 肉屋橫町＋秋葉原
              createBackup:
                value:
                  action: createBackup
                  label: before-voice-ops
                  reason: Before GPT voice edits
      responses:
        '200':
          description: Action result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GptTripPlannerActionResponse'
        '401':
          description: Missing or invalid API key.
        '400':
          description: Invalid request or blocked action.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    Zone:
      type: string
      enum: [morning, afternoon, evening, night, flexible]
    LocationInput:
      type: object
      additionalProperties: false
      properties:
        placeName:
          type: string
        address:
          type: string
        lat:
          type: number
        lng:
          type: number
        source:
          type: string
          enum: [manual, geocoding, ai]
        confidence:
          type: string
          enum: [high, medium, low]
    CandidateCardInput:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
        subtitle:
          type: string
        area:
          type: string
        zone:
          $ref: '#/components/schemas/Zone'
        duration:
          type: string
        note:
          type: string
        tags:
          type: array
          items:
            type: string
        location:
          $ref: '#/components/schemas/LocationInput'
    GptTripPlannerActionRequest:
      type: object
      additionalProperties: false
      required: [action]
      properties:
        action:
          type: string
          enum:
            - inspectTrip
            - inspectDay
            - inspectCard
            - searchCards
            - findCards
            - addCandidateCard
            - updateCandidateCard
            - appendCommentToCard
            - moveCardToSlot
            - removeCardFromSlot
            - renameDayLabel
            - createBackup
        planId:
          type: string
          description: Optional plan id. If omitted, the gateway reads the current Firestore activePlanId.
        date:
          type: string
          description: Date such as YYYY-MM-DD, YYYY-M-D, M/D, or M-D. Short dates are matched against the active trip's days.
        zone:
          $ref: '#/components/schemas/Zone'
        cardId:
          type: string
          description: Existing card id for inspect, comment, or move.
        titleKeyword:
          type: string
          description: Card title keyword when cardId is unknown.
        query:
          type: string
          description: Generic card search query.
        card:
          $ref: '#/components/schemas/CandidateCardInput'
        patch:
          $ref: '#/components/schemas/CandidateCardInput'
        missingLocation:
          type: boolean
          description: For searchCards, return only cards missing usable lat/lng when true.
        unscheduledOnly:
          type: boolean
          description: For searchCards, return only cards not scheduled in any plan when true.
        area:
          type: string
          description: For searchCards, filter by card area.
        tags:
          type: array
          items:
            type: string
          description: For searchCards, require matching tags.
        limit:
          type: integer
          minimum: 1
          maximum: 50
        text:
          type: string
          description: Comment text for appendCommentToCard.
        label:
          type: string
          description: Day label for renameDayLabel or backup label for createBackup.
        reason:
          type: string
          description: Backup reason for createBackup.
        index:
          type: integer
          minimum: 0
    GptTripPlannerActionResponse:
      type: object
      additionalProperties: true
      required: [ok, action, summary]
      properties:
        ok:
          type: boolean
        action:
          type: string
        summary:
          type: string
        data:
          type: object
          additionalProperties: true
        warnings:
          type: array
          items:
            type: string
        auditId:
          type: string
        errorCode:
          type: string
        message:
          type: string
